<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="tsn-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080b1f"/>
      <stop offset="0.55" stop-color="#161d40"/>
      <stop offset="1" stop-color="#3a2547"/>
    </linearGradient>
    <radialGradient id="tsn-haze" cx="0.5" cy="0.92" r="0.75">
      <stop offset="0" stop-color="#ff9d4d" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ff9d4d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="tsn-win" width="24" height="32" patternUnits="userSpaceOnUse">
      <rect width="24" height="32" fill="#0b0f24"/>
      <rect x="4" y="5" width="11" height="9" fill="#ffd98a" opacity="0.45"/>
      <rect x="4" y="20" width="11" height="9" fill="#aec6ff" opacity="0.28"/>
    </pattern>
    <linearGradient id="tsn-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2348"/>
      <stop offset="1" stop-color="#0e1430"/>
    </linearGradient>
    <filter id="tsn-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- sky + ground haze -->
  <rect width="1600" height="1000" fill="url(#tsn-sky)"/>
  <rect width="1600" height="1000" fill="url(#tsn-haze)"/>

  <!-- left building canyon -->
  <polygon points="0,40 360,150 360,1000 0,1000" fill="#0b0f24"/>
  <polygon points="40,120 320,210 320,900 40,900" fill="url(#tsn-win)" opacity="0.9"/>
  <!-- right building canyon -->
  <polygon points="1600,30 1180,140 1180,1000 1600,1000" fill="#0a0d20"/>
  <polygon points="1560,110 1240,200 1240,900 1560,900" fill="url(#tsn-win)" opacity="0.9"/>

  <!-- decorative neon signs (side) -->
  <g filter="url(#tsn-glow)">
    <rect x="70" y="250" width="210" height="90" rx="6" fill="#ff2e63" opacity="0.85"/>
    <rect x="92" y="430" width="170" height="150" rx="6" fill="#19c3b1" opacity="0.8"/>
    <rect x="1300" y="240" width="220" height="120" rx="6" fill="#ffd23f" opacity="0.85"/>
    <rect x="1320" y="450" width="180" height="200" rx="6" fill="#3b6bff" opacity="0.8"/>
  </g>
  <g font-family="'Spline Sans Mono',monospace" fill="#0b0f24" font-weight="600">
    <text x="98" y="305" font-size="34" letter-spacing="2">NEON</text>
    <text x="1330" y="312" font-size="34" letter-spacing="2">★ 24/7</text>
  </g>

  <!-- ticker strip -->
  <rect x="360" y="640" width="820" height="44" fill="#13183a"/>
  <text x="380" y="671" font-family="'Spline Sans Mono',monospace" font-size="24"
        fill="#ff5a3c" letter-spacing="6">● LIVE ● BREAKING ● TIMES SQ ● LIVE ●</text>

  <!-- glow halo behind the target -->
  <rect x="500" y="90" width="620" height="540" fill="#5878ff" opacity="0.22" filter="url(#tsn-glow)"/>

  <!-- TARGET ad surface (corners match presets.ts) -->
  <polygon points="540,170 1060,120 1060,600 540,540" fill="url(#tsn-panel)"
           stroke="#7fa0ff" stroke-width="4"/>
  <polygon points="540,170 1060,120 1060,600 540,540" fill="none"
           stroke="#cfe0ff" stroke-width="1" opacity="0.6"/>
  <g stroke="#7fa0ff" stroke-width="2" opacity="0.85">
    <path d="M580,212 h36 M580,212 v26"/>
    <path d="M1020,166 h-36 M1020,166 v26"/>
    <path d="M1020,556 h-36 M1020,556 v-26"/>
    <path d="M580,500 h36 M580,500 v-26"/>
  </g>
  <text x="800" y="350" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="30" letter-spacing="7" fill="#9db8ff">AD SURFACE</text>
  <text x="800" y="392" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="17" letter-spacing="3" fill="#6f86c8">DROP IMAGE HERE</text>

  <!-- street level: light streaks + crowd -->
  <rect y="820" width="1600" height="180" fill="#0a0c1d"/>
  <g opacity="0.85">
    <rect x="120" y="852" width="360" height="7" fill="#ffd23f" rx="3"/>
    <rect x="240" y="884" width="300" height="6" fill="#ff7a3c" rx="3"/>
    <rect x="1050" y="860" width="380" height="7" fill="#ff3b3b" rx="3"/>
    <rect x="980" y="892" width="320" height="6" fill="#ff5252" rx="3"/>
  </g>
  <g fill="#05060f">
    <circle cx="430" cy="900" r="26"/><path d="M404,936 q26,-30 52,0 l8,64 -68,0 z"/>
    <circle cx="560" cy="912" r="22"/><path d="M538,944 q22,-26 44,0 l7,56 -58,0 z"/>
    <circle cx="1080" cy="906" r="24"/><path d="M1056,940 q24,-28 48,0 l7,60 -62,0 z"/>
    <circle cx="1210" cy="916" r="20"/><path d="M1190,946 q20,-24 40,0 l6,54 -52,0 z"/>
  </g>
</svg>
