<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="sk-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe3df"/>
      <stop offset="1" stop-color="#ece7d8"/>
    </linearGradient>
    <linearGradient id="sk-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9c0ac"/>
      <stop offset="1" stop-color="#b6ab92"/>
    </linearGradient>
    <linearGradient id="sk-panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf6ee"/>
      <stop offset="1" stop-color="#e8dfcc"/>
    </linearGradient>
    <linearGradient id="sk-panshade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.78" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- sky & ground -->
  <rect width="1600" height="1000" fill="url(#sk-sky)"/>
  <rect y="760" width="1600" height="240" fill="url(#sk-ground)"/>
  <line x1="0" y1="760" x2="1600" y2="760" stroke="#1b1714" stroke-opacity="0.15"/>

  <!-- distant buildings -->
  <g fill="#1b1714" fill-opacity="0.10">
    <rect x="60" y="320" width="180" height="440"/>
    <rect x="270" y="240" width="120" height="520"/>
    <rect x="1180" y="280" width="160" height="480"/>
    <rect x="1360" y="200" width="190" height="560"/>
  </g>
  <g fill="#1b1714" fill-opacity="0.06">
    <rect x="86" y="350" width="20" height="30"/><rect x="126" y="350" width="20" height="30"/>
    <rect x="86" y="410" width="20" height="30"/><rect x="126" y="410" width="20" height="30"/>
    <rect x="1400" y="240" width="22" height="34"/><rect x="1450" y="240" width="22" height="34"/>
    <rect x="1400" y="310" width="22" height="34"/><rect x="1450" y="310" width="22" height="34"/>
  </g>

  <!-- kiosk base / pedestal -->
  <polygon points="548,810 972,840 1004,930 516,900" fill="#1b1714" fill-opacity="0.55"/>
  <ellipse cx="760" cy="930" rx="250" ry="22" fill="#1b1714" fill-opacity="0.13"/>

  <!-- kiosk frame behind panel -->
  <polygon points="552,190 968,228 984,852 536,824" fill="#2a241d"/>

  <!-- main panel: the ad surface (corners match presets.ts) -->
  <polygon points="575,215 945,250 960,840 560,810" fill="url(#sk-panel)"
           stroke="#1b1714" stroke-opacity="0.45" stroke-width="3"/>
  <polygon points="575,215 945,250 960,840 560,810" fill="url(#sk-panshade)"/>

  <!-- crop marks + label -->
  <g stroke="#938979" stroke-width="2">
    <path d="M610,256 h32 M610,256 v24"/>
    <path d="M912,288 h-32 M912,288 v24"/>
    <path d="M918,800 h-32 M918,800 v-24"/>
    <path d="M604,772 h32 M604,772 v-24"/>
  </g>
  <text x="760" y="520" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="26" letter-spacing="5" fill="#938979">AD SURFACE</text>
  <text x="760" y="556" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="16" letter-spacing="3" fill="#b3a890">DROP IMAGE HERE</text>

  <!-- pedestrian silhouette -->
  <g fill="#1b1714" fill-opacity="0.5">
    <circle cx="1180" cy="700" r="28"/>
    <path d="M1152 740 q28 -34 56 0 l12 120 -32 4 -8 -78 -8 78 -32 -4 z"/>
  </g>
</svg>
