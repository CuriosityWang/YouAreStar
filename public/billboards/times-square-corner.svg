<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="tsc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0820"/>
      <stop offset="0.6" stop-color="#221a45"/>
      <stop offset="1" stop-color="#4a2c4e"/>
    </linearGradient>
    <radialGradient id="tsc-haze" cx="0.4" cy="0.95" r="0.8">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="tsc-win" width="26" height="30" patternUnits="userSpaceOnUse">
      <rect width="26" height="30" fill="#0c0a22"/>
      <rect x="5" y="5" width="13" height="8" fill="#ffe0a0" opacity="0.4"/>
    </pattern>
    <linearGradient id="tsc-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#241a44"/>
      <stop offset="1" stop-color="#120c2c"/>
    </linearGradient>
    <filter id="tsc-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#tsc-sky)"/>
  <rect width="1600" height="1000" fill="url(#tsc-haze)"/>

  <!-- right-receding building face -->
  <polygon points="720,250 1600,90 1600,1000 720,1000" fill="#0d0a26"/>
  <polygon points="800,300 1560,150 1560,900 800,940" fill="url(#tsc-win)" opacity="0.85"/>
  <!-- right-face neon stack -->
  <g filter="url(#tsc-glow)">
    <rect x="900" y="330" width="300" height="120" fill="#ff2e63" opacity="0.85" transform="skewY(-7)"/>
    <rect x="930" y="560" width="360" height="150" fill="#19c3b1" opacity="0.8" transform="skewY(-7)"/>
    <rect x="980" y="770" width="380" height="120" fill="#ffd23f" opacity="0.82" transform="skewY(-7)"/>
  </g>

  <!-- left building block holding the target -->
  <polygon points="0,60 360,160 360,1000 0,1000" fill="#0a0820"/>
  <polygon points="40,150 340,250 340,980 40,980" fill="url(#tsc-win)" opacity="0.7"/>

  <!-- the wedge between faces -->
  <polygon points="360,160 420,180 420,1000 360,1000" fill="#05040f"/>

  <!-- glow halo behind target -->
  <rect x="300" y="120" width="480" height="780" fill="#7a5cff" opacity="0.2" filter="url(#tsc-glow)"/>

  <!-- TARGET ad surface (corners match presets.ts) -->
  <polygon points="360,160 720,250 720,860 360,740" fill="url(#tsc-panel)"
           stroke="#b89bff" stroke-width="4"/>
  <polygon points="360,160 720,250 720,860 360,740" fill="none"
           stroke="#e3d6ff" stroke-width="1" opacity="0.55"/>
  <g stroke="#b89bff" stroke-width="2" opacity="0.85">
    <path d="M398,206 h34 M398,206 v26"/>
    <path d="M684,294 h-32 M684,294 v26"/>
    <path d="M684,820 h-32 M684,820 v-26"/>
    <path d="M398,702 h34 M398,702 v-26"/>
  </g>
  <text x="540" y="510" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="26" letter-spacing="6" fill="#c9b6ff">AD</text>
  <text x="540" y="548" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="26" letter-spacing="6" fill="#c9b6ff">SURFACE</text>
  <text x="540" y="590" text-anchor="middle" font-family="'Spline Sans Mono',monospace"
        font-size="15" letter-spacing="3" fill="#8b78c8">DROP IMAGE</text>

  <!-- street -->
  <rect y="900" width="1600" height="100" fill="#08060f"/>
  <g opacity="0.85">
    <rect x="500" y="922" width="520" height="7" fill="#ffd23f" rx="3"/>
    <rect x="620" y="952" width="440" height="6" fill="#ff5a3c" rx="3"/>
  </g>
  <g fill="#04030c">
    <circle cx="470" cy="930" r="22"/><path d="M448,962 q22,-26 44,0 l7,38 -58,0 z"/>
    <circle cx="780" cy="936" r="20"/><path d="M760,966 q20,-24 40,0 l6,34 -52,0 z"/>
  </g>
</svg>
